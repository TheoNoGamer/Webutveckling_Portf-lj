<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="game-container">
        <h1>Blackjack</h1>

        <div id="winner-popup" class="winner-popup">
            <p id="winner-text">Winner</p>
        </div>

        <div class="game-view">
            <button id="restart-button">Restart</button>
            <div class="dealer" style="text-align: center;">
                <h3>Dealer</h3>
                <p id="dealer-score">0</p>
                <div id="dealer-card-display" class="card-display">
                </div>
            </div>
            <div class="player" style="text-align: center;">
                <h3>Player</h3>
                <p id="player-score">0</p>
                <div id="player-card-display" class="card-display">
                </div>
                <div class="button-container">
                    <button id="hit-button">Hit</button>
                    <button id="stand-button">Stand</button>
                </div>
            </div>
        </div>

        <div id="footer" class="footer">
            <a href="../../../../index.html">Home</a>
            <a href="../index.html">Blackjack</a>
            <a href="../../../_template.html">Template</a>
            <a href="../doc/doc.json">Documentation</a>
        </div>

    </div>

    <script src="../js/app.js"></script>
</body>
</html>
